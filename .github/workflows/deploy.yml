name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Build Production Application
        run: npm run build

      - name: Inject NoJekyll Asset Override
        run: touch ./dist/.nojekyll

      - name: Upload Build Artifacts to Pages Engine
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Direct Deploy to GitHub Pages Infrastructure
        id: deployment
        uses: actions/deploy-pages@v4
